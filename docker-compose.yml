version: "3.9"

services:
  mf-analytics:
    build:
      context: .
      dockerfile: Dockerfile
    image: mf-analytics:latest
    container_name: mf-analytics
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      # Persist SQLite database across container restarts
      - mf-data:/app/data
    environment:
      SERVER_PORT: "8080"
      DATABASE_PATH: "/app/data/mf_analytics.db"
      MFAPI_BASE_URL: "https://api.mfapi.in"
      # ── Strict rate limits (all three enforced simultaneously) ──────────────
      RATE_PER_SECOND: "2"
      RATE_PER_MINUTE: "50"
      RATE_PER_HOUR:   "300"
      # ── Pipeline ─────────────────────────────────────────────────────────────
      SYNC_INTERVAL_HOURS: "24"
      BACKFILL_YEARS:      "10"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  mf-data:
    driver: local

